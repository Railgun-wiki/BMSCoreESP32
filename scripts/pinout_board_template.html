<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32-S3 Pinout Viewer</title>
  <style>
    :root {
      --bg: #edf4fb;
      --panel: rgba(255, 255, 255, 0.94);
      --border: #78b9ff;
      --ink: #203144;
      --muted: #60758c;
      --shadow: 0 18px 48px rgba(28, 74, 134, 0.14);
      --chip: #1c2634;
      --lcd: #2f6fed;
      --dac: #f28c28;
      --i2c: #2ea043;
      --uart: #1fb6c9;
      --system: #d73a49;
      --free: #d5dce7;
      --reserved: #6b7280;
      --power: #b91c1c;
      --ground: #111111;
      --warning: #ffd04d;
      --connector: #8ea9c7;
      --board-stage-height: 760px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 20%, rgba(120, 185, 255, 0.18), transparent 32%),
        radial-gradient(circle at 80% 18%, rgba(47, 111, 237, 0.12), transparent 28%),
        linear-gradient(180deg, #f7fbff 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    .page {
      max-width: 1680px;
      margin: 18px auto;
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 22px 28px 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.02em;
    }

    .header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      max-width: 720px;
    }

    .mode-button {
      border: 1px solid #b5d6ff;
      background: #ffffff;
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
      box-shadow: 0 2px 8px rgba(80, 126, 188, 0.08);
    }

    .mode-button:hover { transform: translateY(-1px); }
    .mode-button.active {
      background: linear-gradient(135deg, #2f6fed, #6bb7ff);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 8px 22px rgba(47, 111, 237, 0.28);
    }

    .stage {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(260px, 420px) minmax(260px, 1fr);
      gap: 24px;
      align-items: start;
      min-height: calc(var(--board-stage-height) + 18px);
    }

    .rail {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 6px;
    }

    .rail h2 {
      margin: 0 0 8px;
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .rail-canvas {
      position: relative;
      height: var(--board-stage-height);
      min-height: var(--board-stage-height);
    }

    .pin-row {
      position: absolute;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 32px;
      transition: opacity 140ms ease, transform 140ms ease, filter 140ms ease, top 160ms ease;
    }

    .pin-row.hidden {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .pin-row.muted {
      opacity: 0.28;
      filter: grayscale(0.18);
    }

    .pin-row.focused {
      transform: translateX(2px);
    }

    .left .connector {
      flex: 1;
      height: 2px;
      border-top: 2px dashed var(--connector);
      margin-left: 6px;
    }

    .right .connector {
      flex: 1;
      height: 2px;
      border-top: 2px dashed var(--connector);
      margin-right: 6px;
      order: -1;
    }

    .pin-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      border: none;
      border-radius: 999px;
      color: #fff;
      padding: 7px 12px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(49, 84, 128, 0.18);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .pin-chip:hover { transform: translateY(-1px); }
    .pin-chip.selected { box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.22), 0 10px 22px rgba(49, 84, 128, 0.22); }

    .pin-chip .gpio {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      opacity: 0.94;
      white-space: nowrap;
    }

    .pin-chip .label {
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pin-chip .badge {
      font-size: 10px;
      font-weight: 700;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      padding: 2px 7px;
      white-space: nowrap;
    }

    .group-lcd { background: linear-gradient(90deg, #2f6fed, #6ca1ff); }
    .group-dac { background: linear-gradient(90deg, #f28c28, #f7b267); color: #1f1f1f; }
    .group-i2c { background: linear-gradient(90deg, #2ea043, #61c465); }
    .group-uart { background: linear-gradient(90deg, #1fb6c9, #6dd7e4); color: #14313c; }
    .group-system { background: linear-gradient(90deg, #d73a49, #ef6a73); }
    .group-reserved { background: linear-gradient(90deg, #515b68, #7d8794); }
    .group-free { background: linear-gradient(90deg, #d5dce7, #eceff4); color: #243143; }
    .group-power { background: linear-gradient(90deg, #b91c1c, #e11d48); }
    .group-ground { background: linear-gradient(90deg, #111111, #383838); }

    .board-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .board-frame {
      width: 100%;
      max-width: 420px;
      min-height: var(--board-stage-height);
      padding: 16px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(234,244,255,0.98));
      border: 1px solid rgba(120, 185, 255, 0.45);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 14px 34px rgba(84, 126, 190, 0.12);
    }

    .board-svg {
      width: 100%;
      height: var(--board-stage-height);
      display: block;
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
    }

    .summary-card {
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(120, 185, 255, 0.28);
      border-radius: 16px;
      padding: 10px 12px;
      text-align: center;
    }

    .summary-card .num {
      font-size: 22px;
      font-weight: 800;
    }

    .summary-card .cap {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .footer {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 1.15fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .legend, .detail-card {
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(120, 185, 255, 0.28);
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: 0 10px 24px rgba(83, 123, 184, 0.08);
    }

    .legend h3, .detail-card h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .legend-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 6px 16px rgba(49, 84, 128, 0.12);
    }

    .notes {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 8px 12px;
      font-size: 13px;
      line-height: 1.45;
    }

    .detail-grid dt {
      color: var(--muted);
      font-weight: 700;
    }

    .detail-grid dd {
      margin: 0;
      color: var(--ink);
    }

    .meta {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 1260px) {
      .stage { grid-template-columns: 1fr; }
      .board-wrap { order: -1; }
      .rail-canvas { height: auto; min-height: 0; }
      .pin-row {
        position: static;
        margin-bottom: 8px;
      }
      .footer { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div>
        <h1 id="page-title"></h1>
        <p id="page-subtitle"></p>
      </div>
      <div class="toolbar" id="toolbar"></div>
    </div>

    <div class="stage">
      <section class="rail left">
        <h2 id="left-title"></h2>
        <div id="left-rail" class="rail-canvas"></div>
      </section>

      <section class="board-wrap">
        <div class="board-frame">
          <svg class="board-svg" viewBox="0 0 320 760" role="img" aria-label="Stylized ESP32 board">
            <defs>
              <linearGradient id="pcb" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#fffdf7" />
                <stop offset="100%" stop-color="#fff7dc" />
              </linearGradient>
              <linearGradient id="module" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0%" stop-color="#535353" />
                <stop offset="100%" stop-color="#242424" />
              </linearGradient>
            </defs>
            <rect x="92" y="10" width="136" height="730" rx="20" fill="url(#pcb)" stroke="#ddb13f" stroke-width="2.2" />
            <rect x="118" y="70" width="84" height="104" rx="6" fill="url(#module)" />
            <rect x="128" y="188" width="64" height="56" rx="4" fill="#4f5560" />
            <rect x="128" y="274" width="64" height="78" rx="4" fill="#555c67" />
            <rect x="126" y="394" width="68" height="70" rx="4" fill="#7d6431" />
            <rect x="122" y="648" width="76" height="62" rx="10" fill="#e0e4ea" stroke="#9aa7b4" />
            <rect x="150" y="634" width="20" height="26" rx="4" fill="#8a949f" />
            <circle cx="118" cy="266" r="10" fill="#eceff4" stroke="#98a4af" />
            <circle cx="202" cy="266" r="10" fill="#eceff4" stroke="#98a4af" />
            <text x="160" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#7a6200">Freenove</text>
            <text x="160" y="54" text-anchor="middle" font-size="11" fill="#6d7480">ESP32-S3 WROOM N16R8</text>
            <text x="160" y="532" text-anchor="middle" font-size="10" fill="#8c7440">USB / UART / Power</text>
            <text x="160" y="290" text-anchor="middle" font-size="11" fill="#4c5968">RST</text>
            <text x="160" y="308" text-anchor="middle" font-size="11" fill="#4c5968">BOOT</text>
            <g fill="#d1a43e">
              <script type="application/ecmascript"><![CDATA[
                // placeholder to keep SVG deterministic
              ]]></script>
            </g>
          </svg>
        </div>

        <div class="summary-strip">
          <div class="summary-card">
            <div class="num" id="tracked-count"></div>
            <div class="cap">Tracked Pins</div>
          </div>
          <div class="summary-card">
            <div class="num" id="free-count"></div>
            <div class="cap">Free GPIO</div>
          </div>
          <div class="summary-card">
            <div class="num" id="restricted-count"></div>
            <div class="cap">Restricted</div>
          </div>
        </div>
      </section>

      <section class="rail right">
        <h2 id="right-title"></h2>
        <div id="right-rail" class="rail-canvas"></div>
      </section>
    </div>

    <div class="footer">
      <section class="legend">
        <h3>Legend & Notes</h3>
        <div class="legend-grid" id="legend-grid"></div>
        <ul class="notes" id="note-list"></ul>
        <div class="meta">Generated at __GENERATED_AT__</div>
      </section>

      <section class="detail-card">
        <h3 id="detail-title">Hover or click a pin</h3>
        <dl class="detail-grid" id="detail-grid"></dl>
      </section>
    </div>
  </div>

  <script>
    const PINOUT_DATA = __PINOUT_DATA__;

    const groupClass = {
      lcd: "group-lcd",
      dac: "group-dac",
      i2c: "group-i2c",
      uart: "group-uart",
      system: "group-system",
      free: "group-free",
      reserved: "group-reserved",
      power: "group-power",
      ground: "group-ground"
    };

    const state = {
      mode: PINOUT_DATA.page_config.view_modes[0].id,
      selectedId: null
    };

    const detailGrid = document.getElementById("detail-grid");
    const detailTitle = document.getElementById("detail-title");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function initHeader() {
      document.getElementById("page-title").textContent = PINOUT_DATA.meta.title;
      document.getElementById("page-subtitle").textContent = PINOUT_DATA.meta.subtitle;
      document.getElementById("left-title").textContent = PINOUT_DATA.page_config.layout.left_title;
      document.getElementById("right-title").textContent = PINOUT_DATA.page_config.layout.right_title;
      document.getElementById("tracked-count").textContent = PINOUT_DATA.tracked_gpio_count;
      document.getElementById("free-count").textContent = PINOUT_DATA.free_gpio_count;
      document.getElementById("restricted-count").textContent = PINOUT_DATA.restricted_count;
    }

    function modeMatches(item, mode) {
      if (mode === "overview") return true;
      if (mode === "project-used") return item.is_project_used || item.kind === "special";
      if (mode === "spi-highlight") return item.render_group === "lcd" || item.render_group === "dac";
      if (mode === "i2c-highlight") return item.render_group === "i2c";
      if (mode === "restricted") {
        return item.status === "reserved" || item.kind === "restricted-range" || (item.display_badges || []).includes("boot");
      }
      if (mode === "available-gpio") return item.status === "free";
      return true;
    }

    function renderToolbar() {
      const toolbar = document.getElementById("toolbar");
      toolbar.innerHTML = "";
      PINOUT_DATA.page_config.view_modes.forEach((mode) => {
        const button = document.createElement("button");
        button.className = "mode-button" + (mode.id === state.mode ? " active" : "");
        button.textContent = mode.label;
        button.title = mode.description;
        button.addEventListener("click", () => {
          state.mode = mode.id;
          renderToolbar();
          applyMode();
        });
        toolbar.appendChild(button);
      });
    }

    function createPinRow(item, side) {
      const row = document.createElement("div");
      row.className = "pin-row";
      row.dataset.itemId = item.id;
      row.dataset.side = side;
      row.dataset.renderGroup = item.render_group || "";
      row.dataset.status = item.status || "";
      row.dataset.projectUsed = item.is_project_used ? "1" : "0";
      row._item = item;

      const chip = document.createElement("button");
      chip.className = `pin-chip ${groupClass[item.view_color] || groupClass[item.render_group] || groupClass.system}`;
      chip.innerHTML = `
        <span class="gpio">${escapeHtml(item.kind === "pin" || item.kind === "free" ? `GPIO${item.gpio_number}` : item.short_label || item.label || item.id)}</span>
        <span class="label">${escapeHtml(item.short_label || item.label || item.signal_name || item.id)}</span>
        ${(item.badge || (item.display_badges && item.display_badges[0])) ? `<span class="badge">${escapeHtml(item.badge || item.display_badges[0])}</span>` : ""}
      `;

      const connector = document.createElement("div");
      connector.className = "connector";

      function focusItem(lockSelection) {
        showDetail(item);
        if (lockSelection) {
          state.selectedId = item.id;
          document.querySelectorAll(".pin-chip.selected").forEach((node) => node.classList.remove("selected"));
          chip.classList.add("selected");
        }
      }

      chip.addEventListener("mouseenter", () => showDetail(item));
      chip.addEventListener("focus", () => showDetail(item));
      chip.addEventListener("click", () => focusItem(true));

      if (side === "left") {
        row.append(chip, connector);
      } else {
        row.append(connector, chip);
      }
      return row;
    }

    function renderRails() {
      const leftRail = document.getElementById("left-rail");
      const rightRail = document.getElementById("right-rail");
      leftRail.innerHTML = "";
      rightRail.innerHTML = "";

      PINOUT_DATA.left_items.forEach((item) => leftRail.appendChild(createPinRow(item, "left")));
      PINOUT_DATA.right_items.forEach((item) => rightRail.appendChild(createPinRow(item, "right")));
    }

    function layoutRail(railEl) {
      if (window.innerWidth <= 1260) return;
      const rows = Array.from(railEl.querySelectorAll(".pin-row"));
      const visibleRows = rows.filter((row) => !row.classList.contains("hidden"));
      const topPadding = 12;
      const bottomPadding = 18;
      const usableHeight = railEl.clientHeight - topPadding - bottomPadding;
      const count = visibleRows.length;

      visibleRows.forEach((row, index) => {
        const position = count <= 1
          ? usableHeight / 2
          : (usableHeight * index) / (count - 1);
        row.style.top = `${topPadding + position}px`;
        row.style.transform = "translateY(-50%)";
      });

      rows.filter((row) => row.classList.contains("hidden")).forEach((row) => {
        row.style.top = "-9999px";
      });
    }

    function layoutRails() {
      layoutRail(document.getElementById("left-rail"));
      layoutRail(document.getElementById("right-rail"));
    }

    function renderLegend() {
      const legend = document.getElementById("legend-grid");
      legend.innerHTML = "";
      PINOUT_DATA.page_config.legend_groups.forEach((group) => {
        const chip = document.createElement("div");
        chip.className = `legend-item ${groupClass[group.color_token] || groupClass.system}`;
        chip.textContent = group.label;
        legend.appendChild(chip);
      });

      const notes = document.getElementById("note-list");
      notes.innerHTML = "";
      PINOUT_DATA.page_config.notes.forEach((note) => {
        const li = document.createElement("li");
        li.textContent = note;
        notes.appendChild(li);
      });
      if (PINOUT_DATA.warnings.length) {
        PINOUT_DATA.warnings.forEach((warning) => {
          const li = document.createElement("li");
          li.textContent = `Warning: ${warning}`;
          notes.appendChild(li);
        });
      }
    }

    function showDetail(item) {
      detailTitle.textContent = item.detail_title || item.long_label || item.short_label || item.label || item.id;
      const entries = [
        ["Kind", item.kind],
        ["GPIO", item.gpio_number !== undefined ? item.gpio_number : item.label || "-"],
        ["Signal", item.signal_name || item.label || "-"],
        ["Group", item.peripheral_group || item.render_group || "-"],
        ["Status", item.status || "-"],
        ["Direction", item.direction || item.voltage_type || "-"],
        ["Source", item.source_macro || "-"],
        ["Notes", item.notes || "-"]
      ];
      detailGrid.innerHTML = entries.map(([term, value]) => `<dt>${escapeHtml(term)}</dt><dd>${escapeHtml(value)}</dd>`).join("");
    }

    function applyMode() {
      document.querySelectorAll(".pin-row").forEach((row) => {
        const item = row._item;
        const match = modeMatches(item, state.mode);
        row.classList.toggle("muted", !match && state.mode !== "overview");
        row.classList.toggle("hidden", state.mode === "project-used" && item.status === "free");
        if (state.mode !== "project-used") {
          row.classList.remove("hidden");
        }
      });

      if (state.selectedId) {
        const selected = document.querySelector(`.pin-row[data-item-id="${state.selectedId}"] .pin-chip`);
        if (selected) {
          document.querySelectorAll(".pin-chip.selected").forEach((node) => node.classList.remove("selected"));
          selected.classList.add("selected");
        }
      }

      layoutRails();
    }

    initHeader();
    renderToolbar();
    renderRails();
    renderLegend();
    showDetail(PINOUT_DATA.left_items[0] || PINOUT_DATA.right_items[0]);
    applyMode();
    window.addEventListener("resize", layoutRails);
  </script>
</body>
</html>
